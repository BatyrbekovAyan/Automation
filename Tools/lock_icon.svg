<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!--
    Trust padlock for the onboarding «Это безопасно» blocks.
    Rendered white-on-transparent so the Unity Image can tint it (green on the
    trust card). Keyhole is a true transparent knockout via a mask.
    Edit this file, then re-run: cd Tools && node render_lock_icon.js
  -->
  <defs>
    <mask id="keyhole">
      <rect x="0" y="0" width="240" height="240" fill="#ffffff"/>
      <circle cx="120" cy="150" r="15" fill="#000000"/>
      <path d="M112 150 h16 l-4 34 a4 4 0 0 1 -8 0 z" fill="#000000"/>
    </mask>
  </defs>

  <!-- Shackle: a rounded 'U' open at the bottom, legs tucked behind the body top. -->
  <path d="M79 118 V92 a41 41 0 0 1 82 0 V118"
        fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>

  <!-- Body: rounded rectangle with a knocked-out keyhole. -->
  <rect x="58" y="110" width="124" height="108" rx="24" fill="#ffffff" mask="url(#keyhole)"/>
</svg>
